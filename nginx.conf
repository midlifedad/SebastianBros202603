server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Selector page at root
    location = / {
        try_files /index.html =404;
    }

    # Version JSON manifest
    location = /versions.json {
        try_files /versions.json =404;
    }

    # Each version is a Slidev SPA — fallback to its index.html
    location ~ ^/([^/]+)/ {
        try_files $uri $uri/ /$1/index.html =404;
    }
}
