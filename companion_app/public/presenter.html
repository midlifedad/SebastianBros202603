<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Presenter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="presenter-layout">
    <!-- Left column: Check-in feed -->
    <div class="presenter-feed-section">
      <div class="presenter-feed-header">
        <h2 style="font-family:var(--font-heading); font-size:1.5rem; color:var(--text-primary);">Check-Ins</h2>
        <p id="checkin-counter" class="display-counter">0 of 21 checked in</p>
      </div>
      <div id="checkin-feed" class="presenter-feed-list"></div>
    </div>
    <!-- Right column: Poll controls -->
    <div class="presenter-poll-section">
      <h2 style="font-family:var(--font-heading); font-size:1.5rem; color:var(--text-primary); margin-bottom:var(--space-lg);">Poll Controls</h2>

      <!-- Poll creation form (shown when no active poll) -->
      <div id="poll-create-view">
        <div class="poll-form-group">
          <label class="poll-label">Question</label>
          <input type="text" id="poll-question" class="poll-input" placeholder="Enter your question...">
        </div>
        <div id="poll-options-container">
          <label class="poll-label">Options</label>
          <input type="text" class="poll-input poll-option-input" placeholder="Option 1" data-index="0">
          <input type="text" class="poll-input poll-option-input" placeholder="Option 2" data-index="1">
        </div>
        <button id="add-option-btn" class="poll-add-option-btn">+ Add Option</button>
        <button id="launch-poll-btn" class="btn-primary" style="margin-top:var(--space-lg);">Launch Poll</button>
        <p id="poll-error" class="error-msg hidden"></p>
      </div>

      <!-- Active poll view (shown when poll is live) -->
      <div id="poll-active-view" class="hidden">
        <h3 id="active-poll-question" class="poll-active-question"></h3>
        <div id="poll-bars-container" class="poll-bars-container"></div>
        <p id="poll-total-votes" class="text-secondary" style="margin-top:var(--space-md); font-size:0.85rem;"></p>
        <button id="close-poll-btn" class="poll-close-btn">Close Poll</button>
        <div id="close-confirm" class="hidden" style="margin-top:var(--space-sm);">
          <p style="color:var(--text-secondary); font-size:0.85rem; margin-bottom:var(--space-sm);" id="close-confirm-text">Confirm: close this poll?</p>
          <button id="close-confirm-btn" class="poll-close-confirm-btn">Yes, Close Poll</button>
          <button id="close-cancel-btn" class="poll-cancel-btn">Cancel</button>
        </div>
      </div>

      <!-- Poll results view (shown after poll closes) -->
      <div id="poll-results-view" class="hidden">
        <h3 id="results-question" class="poll-active-question"></h3>
        <div id="results-bars-container" class="poll-bars-container"></div>
        <p id="results-total" class="text-secondary" style="margin-top:var(--space-md); font-size:0.85rem;"></p>
        <button id="new-poll-btn" class="btn-primary" style="margin-top:var(--space-lg);">Create New Poll</button>
      </div>
    </div>
  </div>

  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/ws-client.js"></script>
  <script src="/js/presenter.js"></script>
</body>
</html>
