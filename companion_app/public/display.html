<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Display</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="display-layout">
    <!-- QR code centered overlay -->
    <div class="display-qr-overlay">
      <div class="qr-card">
        <canvas id="qr-canvas"></canvas>
      </div>
      <p id="checkin-counter" class="display-counter">0 of 21 checked in</p>
    </div>
    <!-- Check-in cards fill the whole page -->
    <div id="checkin-feed" class="display-feed-wrap"></div>
  </div>

  <script src="/vendor/qrcode.min.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/ws-client.js"></script>
  <script src="/js/display.js"></script>
</body>
</html>
